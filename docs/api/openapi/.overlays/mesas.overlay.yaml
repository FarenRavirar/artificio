# Overlay manual — rotas não detectadas por AST estático (DEB-055-12)
# Fontes:
#   - apps/mesas/backend/src/routes/discord/corrections.ts (createCorrectionHandler factory)
#   - apps/mesas/backend/src/routes/inbox/corrections.ts  (createCorrectionHandler factory)
# merge-overlay.ts mescla este arquivo ao mesas.openapi.yaml gerado.
#
# Formato: apenas blocos de path (mesma indentação do YAML gerado).
# Cada bloco começa com o path e contém os métodos + x-artificio-*.

  /api/v1/admin/discord/automation/auto-approval/guard:
    post:
      operationId: postapi_v1_admin_discord_automation_auto_approval_guard
      summary: Executa guard de auto-aprovação Discord
      x-artificio-owner: mesas
      x-artificio-scope: admin
      x-artificio-status: active
      x-artificio-auth: admin
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Requisição inválida
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          description: Não autenticado
        "403":
          description: Sem permissão
        "423":
          description: Auto-aprovação bloqueada pela trava operacional
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "500":
          description: Erro interno

  /api/v1/admin/discord/automation/eval:
    get:
      operationId: getapi_v1_admin_discord_automation_eval
      summary: Consulta eval offline da automação Discord
      x-artificio-owner: mesas
      x-artificio-scope: admin
      x-artificio-status: active
      x-artificio-auth: admin
      parameters:
        - name: limit
          in: query
          required: false
          description: "Número máximo de correções usadas no eval offline. Padrão: 100; máximo: 1000."
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Requisição inválida
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          description: Não autenticado
        "403":
          description: Sem permissão
        "500":
          description: Erro interno

  /api/v1/admin/discord/drafts/{id}/correction:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: postapi_v1_admin_discord_drafts_id_correction
      summary: Registra correção manual em draft de Discord
      x-artificio-owner: mesas
      x-artificio-scope: admin
      x-artificio-status: provisional
      x-artificio-auth: admin
      description: "Aplica correções manuais ao payload parseado de um draft de Discord. Fonte: createCorrectionHandler via discord/corrections.ts (DEB-055-12)."
      responses:
        "200":
          description: Correção registrada
        "400":
          description: Payload inválido
        "404":
          description: Draft não encontrado

  /api/v1/admin/discord/drafts/{id}/correction/retry-learning:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: postapi_v1_admin_discord_drafts_id_correction_retry_learning
      summary: Reprocessa feedback de aprendizado pendente ou falho do draft de Discord
      x-artificio-owner: mesas
      x-artificio-scope: admin
      x-artificio-status: provisional
      x-artificio-auth: admin
      description: "Reprocessa no outbox as correções cujo aprendizado está pendente ou falhou. Fonte: createCorrectionHandler via discord/corrections.ts."
      responses:
        "200":
          description: Feedbacks reprocessados
        "401":
          description: Não autenticado
        "403":
          description: Sem permissão
        "500":
          description: Erro interno

  /api/v1/admin/discord/drafts/rejected:
    delete:
      operationId: deleteapi_v1_admin_discord_drafts_rejected
      summary: Apaga drafts descartados (status=rejected)
      x-artificio-owner: mesas
      x-artificio-scope: admin
      x-artificio-status: active
      x-artificio-auth: admin
      description: "Remove definitivamente todos os drafts com status=rejected da origem informada, destruindo as capas no Cloudinary antes de apagar as linhas. Fonte: routes/discord/drafts.ts."
      parameters:
        - name: origin
          in: query
          required: false
          schema:
            type: string
            enum: [discord, inbox, all]
            default: all
      responses:
        "200":
          description: OK
        "400":
          description: Parâmetros inválidos
        "401":
          description: Não autenticado
        "403":
          description: Sem permissão
        "500":
          description: Erro interno

  /api/v1/admin/import/drafts/{id}/correction:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: postapi_v1_admin_import_drafts_id_correction
      summary: Registra correção manual em draft de importação
      x-artificio-owner: mesas
      x-artificio-scope: admin
      x-artificio-status: provisional
      x-artificio-auth: admin
      description: "Aplica correções manuais ao payload parseado de um draft de inbox/importação. Fonte: createCorrectionHandler via inbox/corrections.ts (DEB-055-12)."
      responses:
        "200":
          description: Correção registrada
        "400":
          description: Payload inválido
        "404":
          description: Draft não encontrado

  /api/v1/admin/import/drafts/{id}/correction/retry-learning:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: postapi_v1_admin_import_drafts_id_correction_retry_learning
      summary: Reprocessa feedback de aprendizado pendente ou falho do draft de importação
      x-artificio-owner: mesas
      x-artificio-scope: admin
      x-artificio-status: provisional
      x-artificio-auth: admin
      description: "Reprocessa no outbox as correções cujo aprendizado está pendente ou falhou. Fonte: createCorrectionHandler via inbox/corrections.ts."
      responses:
        "200":
          description: Feedbacks reprocessados
        "401":
          description: Não autenticado
        "403":
          description: Sem permissão
        "500":
          description: Erro interno
