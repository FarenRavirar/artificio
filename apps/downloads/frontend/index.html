    <!-- Tema lua/sol sem flash (D067). Cookie compartilhado `artificio_theme`. -->
    <script>
      (function () {
        try {
          var m = document.cookie.match(/(?:^|;\s*)artificio_theme=(dark|light)/);
          document.documentElement.dataset.theme = m ? m[1] : 'dark';
        } catch (e) { document.documentElement.dataset.theme = 'dark'; }
      })();
    </script>
