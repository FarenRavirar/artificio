# nginx.conf — Frontend Downloads RPG
# Serve o build estatico do React e faz proxy das chamadas /api para o backend

set_real_ip_from ${TRUSTED_REAL_IP_FROM};
real_ip_header CF-Connecting-IP;
real_ip_recursive on;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    location /api/ {
        proxy_pass http://${API_UPSTREAM}:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /robots.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=300, no-transform";
        try_files /robots.txt =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
