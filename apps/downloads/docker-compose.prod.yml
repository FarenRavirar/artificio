services:
  downloads-app:
    build:
      context: ../..
      dockerfile: apps/downloads/frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://downloads.artificiorpg.com}
        VITE_PUBLIC_SITE_URL: ${VITE_PUBLIC_SITE_URL:-https://downloads.artificiorpg.com}
        VITE_ACCOUNTS_URL: ${VITE_ACCOUNTS_URL:-https://accounts.artificiorpg.com}
        VITE_GA_ID: ${VITE_GA_ID:-G-2H50PCM950}
        VITE_SITE_ADMIN_SYSTEMS_URL: ${VITE_SITE_ADMIN_SYSTEMS_URL:-https://artificiorpg.com/admin/sistemas}
    container_name: downloads-app
    restart: always
    expose:
      - "80"
    networks:
      - artificio_net
    environment:
      - API_UPSTREAM=downloads-api
      - TRUSTED_REAL_IP_FROM=${TRUSTED_REAL_IP_FROM:-172.18.0.0/16}
    depends_on:
      downloads-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  downloads-api:
    build:
      context: ../..
      dockerfile: apps/downloads/backend/Dockerfile
    container_name: downloads-api
    restart: always
    expose:
      - "3000"
    networks:
      - artificio_net
    environment:
      - NODE_ENV=production
      - APP_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - FRONTEND_URL=https://downloads.artificiorpg.com
      - ACCOUNTS_URL=${ACCOUNTS_URL:-https://accounts.artificiorpg.com}
      # Spec 083: resolucao server-to-server de e-mail do autor (accounts.)
      # e envio transacional (Resend) de reprovacao/aprovacao de material.
      - SERVICE_SECRET=${SERVICE_SECRET:?SERVICE_SECRET is required}
      - RESEND_API_KEY=${RESEND_API_KEY:?RESEND_API_KEY is required}
      - EMAIL_FROM_ADDRESS=${EMAIL_FROM_ADDRESS:-no-reply@artificiorpg.com}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - CATALOG_API_URL=${CATALOG_API_URL:-http://site-prod-app:4322}
      - CATALOG_INTERNAL_TOKEN=${CATALOG_INTERNAL_TOKEN:?CATALOG_INTERNAL_TOKEN is required}
    depends_on:
      downloads-db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m

  downloads-db:
    image: postgres:16-alpine
    container_name: downloads-db
    restart: always
    networks:
      - artificio_net
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: downloads
    volumes:
      - pgdata_downloads_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d downloads"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata_downloads_prod:

networks:
  artificio_net:
    external: true
