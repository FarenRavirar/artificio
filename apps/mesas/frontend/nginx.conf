# nginx.conf — Frontend Mesas RPG
# Serve o build estático do React e faz proxy das chamadas /api para o backend

# Detecta crawlers para servir OG dinâmico via backend
map $http_user_agent $is_crawler {
    default 0;
    ~*facebookexternalhit 1;
    ~*Facebot 1;
    ~*Twitterbot 1;
    ~*LinkedInBot 1;
    ~*WhatsApp 1;
    ~*Slackbot 1;
    ~*Discordbot 1;
    ~*TelegramBot 1;
    ~*Googlebot 1;
    ~*bingbot 1;
    ~*Applebot 1;
    ~*Embedly 1;
    ~*redditbot 1;
    ~*SkypeUriPreview 1;
    ~*vkShare 1;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip para assets estáticos
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Proxy de /api para o container da API Node.js
    location /api/ {
        proxy_pass http://${API_UPSTREAM}:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Proxy do fluxo OAuth Google (somente endpoints do backend)
    location = /auth/google {
        proxy_pass http://${API_UPSTREAM}:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /auth/google/callback {
        proxy_pass http://${API_UPSTREAM}:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy do fluxo OAuth Discord
    location = /auth/discord/connect {
        proxy_pass http://${API_UPSTREAM}:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /auth/discord/callback {
        proxy_pass http://${API_UPSTREAM}:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Assets estáticos com cache longo (Vite gera hashes nos nomes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fallback SPA — qualquer rota desconhecida retorna index.html (React Router)
    # Para crawler, redireciona para named location que delega OG dinâmico ao backend
    error_page 418 = @og_proxy;

    location / {
        if ($is_crawler = 1) {
            return 418;
        }

        try_files $uri $uri/ /index.html;
    }

    location @og_proxy {
        rewrite ^/(.*)$ /og/$1 break;
        proxy_pass http://${API_UPSTREAM}:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
