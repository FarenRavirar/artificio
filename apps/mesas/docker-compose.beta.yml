services:
  mesas-beta-app:
    build:
      context: ../..
      dockerfile: apps/mesas/frontend/Dockerfile
      args:
        VITE_ENABLE_DEVTOOLS: ${VITE_ENABLE_DEVTOOLS:-true}
        VITE_API_URL: ${VITE_API_URL:-https://mesasbeta.artificiorpg.com}
        VITE_PUBLIC_SITE_URL: ${VITE_PUBLIC_SITE_URL:-https://mesasbeta.artificiorpg.com}
        VITE_CLOUDINARY_CLOUD_NAME: ${VITE_CLOUDINARY_CLOUD_NAME}
        VITE_CLOUDINARY_UPLOAD_PRESET: ${VITE_CLOUDINARY_UPLOAD_PRESET}
        VITE_ACCOUNTS_URL: ${VITE_ACCOUNTS_URL:-https://accounts.artificiorpg.com}
    container_name: mesas-beta-app
    restart: always
    expose:
      - "80"
    networks:
      - artificio_net
    environment:
      - NODE_ENV=production
      - VITE_ENV=beta
      - API_UPSTREAM=mesas-beta-api
      - VITE_API_URL=${VITE_API_URL}
      - VITE_PUBLIC_SITE_URL=${VITE_PUBLIC_SITE_URL:-https://mesasbeta.artificiorpg.com}
      - VITE_CLOUDINARY_CLOUD_NAME=${VITE_CLOUDINARY_CLOUD_NAME}
      - VITE_CLOUDINARY_UPLOAD_PRESET=${VITE_CLOUDINARY_UPLOAD_PRESET}
      - TRUSTED_REAL_IP_FROM=${TRUSTED_REAL_IP_FROM:-172.18.0.0/16}
    command:
      - /bin/sh
      - -c
      - rm -rf /frontend-dist/* && cp -r /usr/share/nginx/html/. /frontend-dist/ && exec /docker-entrypoint.sh nginx -g 'daemon off;'
    volumes:
      - frontend_dist_beta:/frontend-dist
    depends_on:
      - mesas-beta-api
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  mesas-beta-api:
    build:
      context: ../..
      dockerfile: apps/mesas/backend/Dockerfile
    container_name: mesas-beta-api
    restart: always
    expose:
      - "3000"
    networks:
      - artificio_net
    environment:
      - NODE_ENV=development
      - PROD_DB_URL=${PROD_DB_URL}
      - APP_ENV=beta
      - PORT=3000
      - DB_HOST=mesas-beta-db
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=mesas_rpg
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - JWT_REFRESH_EXPIRES_IN=7d
      - ACCOUNTS_URL=${ACCOUNTS_URL:-https://accounts.artificiorpg.com}
      - FRONTEND_URL=https://mesasbeta.artificiorpg.com
      - PUBLIC_SITE_URL=https://mesasbeta.artificiorpg.com
      - INDEX_HTML_PATH=/app/frontend-dist/index.html
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - TRUSTED_PROXY_CIDR=${TRUSTED_PROXY_CIDR:-172.18.0.0/16}
    depends_on:
      mesas-beta-db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - frontend_dist_beta:/app/frontend-dist:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m

  mesas-beta-db:
    image: postgres:16-alpine
    container_name: mesas-beta-db
    restart: always
    networks:
      - artificio_net
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mesas_rpg
    volumes:
      - pgdata_mesas_beta:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/00_init.sql
      - ./database/migration_01_base_schema.sql:/docker-entrypoint-initdb.d/01_base_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d mesas_rpg"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata_mesas_beta:
  frontend_dist_beta:

networks:
  artificio_net:
    external: true
