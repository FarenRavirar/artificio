<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grande Glossário de RPG · Artifício RPG</title>
    <meta name="description" content="O maior glossário colaborativo de tradução de RPG em português. Termos de D&D, Pathfinder, The Witcher, Cosmere e muito mais — gratuito, sem anúncios, feito pela comunidade." />
    <meta property="og:title" content="Grande Glossário de RPG · Artifício RPG" />
    <meta property="og:description" content="Glossário colaborativo e gratuito de tradução para RPG de mesa. Explore termos de D&D 5e, Pathfinder, cenários de fantasia e contribua com a comunidade." />
    <meta property="og:url" content="https://glossario.artificiorpg.com" />

    <!-- Tema lua/sol sem flash: espelha resolveTheme (@artificio/ui) antes do paint (Spec 020) -->
    <script>
      (function () {
        try {
          var m = document.cookie.match(/(?:^|;\s*)artificio_theme=(dark|light)/);
          var t = m ? m[1] : (localStorage.getItem('theme') === 'dark' || localStorage.getItem('theme') === 'light'
            ? localStorage.getItem('theme')
            : (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
          document.documentElement.dataset.theme = t;
        } catch (e) { document.documentElement.dataset.theme = 'light'; }
      })();
    </script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XMRHY3FE58"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XMRHY3FE58');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
