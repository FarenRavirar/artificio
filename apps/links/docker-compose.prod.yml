# Deploy prod do links (spec 013 F5): links.artificiorpg.com. 2 containers: app (Express serve Astro dist + API) + db (store).
# Domínio links.artificiorpg.com → links-app via Cloudflare Tunnel (rota = ação do mantenedor).
# Espelha apps/site/docker-compose.prod.yml.
services:
  links-app:
    build:
      context: ../..
      dockerfile: apps/links/Dockerfile
    container_name: links-app
    restart: always
    expose:
      - "4324"
    networks:
      - artificio_net
    environment:
      - NODE_ENV=production
      - PORT=4324
      - DATABASE_URL=${DATABASE_URL}
      - PUBLIC_LINKS_URL=https://links.artificiorpg.com
      - JWT_SECRET=${JWT_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}
      - PUBLIC_GSC_VERIFICATION=${PUBLIC_GSC_VERIFICATION:-}
      - TRUSTED_PROXY_CIDR=${TRUSTED_PROXY_CIDR:-172.18.0.0/16}
    depends_on:
      links-db:
        condition: service_healthy
    # LINKS_FORCE_REBUILD=true p/ forçar rebuild Astro mesmo com dist/ presente (ex.: seed inicial).
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4324/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 512m

  links-db:
    image: postgres:16-alpine
    container_name: links-db
    restart: always
    networks:
      - artificio_net
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: links
    volumes:
      - pgdata_links_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d links"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata_links_prod:

networks:
  artificio_net:
    external: true
