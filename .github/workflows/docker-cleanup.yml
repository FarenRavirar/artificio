# ============================================================================
# WORKFLOW: Docker Cleanup
# RESPONSABILIDADE: Manutenção da VM (limpeza periódica de recursos Docker)
# TRIGGER: Agendado (domingos 03:00 UTC) ou manual (workflow_dispatch)
# ESCOPO: VM Oracle (uma daemon Docker → cobre prod + beta de todos os módulos)
# ORIGEM: migrado do legado mesas_rpg_artificio (unificado no monorepo).
#         Usa os secrets canônicos DEPLOY_* (mesmo mecanismo de _deploy-module).
# NOTES: Remove dangling/cache/órfãos e mantém só as 3 imagens mais recentes
#        por repositório. Nunca toca volumes (dados preservados). Imagem em uso
#        pelo container atual é a mais recente → fica entre as 3 mantidas.
# ============================================================================

name: Docker Cleanup

# Default branch = `dev` desde 2026-06-17 (D073). Como `schedule` so dispara da branch
# DEFAULT, este cron agora roda da copia de `dev`. O job `guard` so libera a limpeza da
# VM (acao de PROD) se este workflow estiver IDENTICO a `origin/main` (= promovido);
# diferiu => pula com warning ate o promote ff dev->main (D041). Fail-safe.
on:
  schedule:
    - cron: '0 3 * * 0' # domingos 03:00 UTC, semanal
  workflow_dispatch:

permissions: {}

# Secrets DEPLOY_* sao repo-level (nao environment); nao usar `environment:` aqui
# para nao registrar deployments fantasmas no log do environment de producao.
jobs:
  # Gate dev->prod (D073): so prossegue se a versao rodando ja esta em origin/main.
  guard:
    name: Guard - so versao promovida (main)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      promoted: ${{ steps.check.outputs.promoted }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Comparar workflow com origin/main
        id: check
        run: |
          set -euo pipefail
          git fetch --no-tags origin main:refs/remotes/origin/main
          if git diff --quiet origin/main -- .github/workflows/docker-cleanup.yml; then
            echo "promoted=true" >> "$GITHUB_OUTPUT"
            echo "workflow == origin/main: ok para limpeza na VM"
          else
            echo "promoted=false" >> "$GITHUB_OUTPUT"
            echo "::warning::docker-cleanup.yml difere de origin/main (nao promovido). Pulando limpeza ate promover (ff dev->main)."
          fi

  cleanup:
    name: Docker cleanup na VM
    needs: guard
    if: needs.guard.outputs.promoted == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45 # I1: cobre ate ~30min de espera por deploy ocioso + limpeza
    concurrency:
      group: artificio-docker-cleanup-lock
      cancel-in-progress: false
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
    steps:
      - name: Validate secrets
        run: |
          set -euo pipefail
          for name in DEPLOY_HOST DEPLOY_KNOWN_HOSTS DEPLOY_PORT DEPLOY_SSH_PRIVATE_KEY DEPLOY_USER; do
            if [ -z "${!name:-}" ]; then
              echo "$name=missing"
              exit 1
            fi
            echo "$name=present"
          done

      - name: Prepare SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/artificio_deploy_key
          chmod 600 ~/.ssh/artificio_deploy_key
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      # Canonico G1: manutenção da VM roda via GitHub Actions para rastreabilidade.
      - name: Cleanup Docker na VM
        run: |
          set -euo pipefail
          # Q1: GITHUB_RUN_ID e controlado pelo GitHub (inteiro); validar = defense-in-depth
          # antes de interpolar no path do script remoto.
          if ! printf '%s' "${GITHUB_RUN_ID:-}" | grep -Eq '^[0-9]+$'; then
            echo "ERRO: GITHUB_RUN_ID nao numerico: '${GITHUB_RUN_ID:-}'"
            exit 1
          fi
          # ServerAlive* mantem a conexao viva durante as esperas de 5 min por deploy ocioso.
          ssh_base=(ssh -i ~/.ssh/artificio_deploy_key -p "$DEPLOY_PORT" -o BatchMode=yes -o ServerAliveInterval=60 -o ServerAliveCountMax=10 "$DEPLOY_USER@$DEPLOY_HOST")

          remote_script="/tmp/artificio-docker-cleanup-${GITHUB_RUN_ID}.sh"
          local_script=$(mktemp)

          cat > "$local_script" <<'REMOTE'
          set -euo pipefail

          # ----------------------------------------------------------------
          # Lock VM-wide (RW) em /tmp/artificio-vm-mutate.lock. Padrao REUSAVEL.
          # Deploys pegam SHARED (flock -s): concorrem entre si normalmente.
          # Manutencao pega EXCLUSIVE (flock -x): espera TODOS os deploys
          # liberarem e SEGURA o lock durante todo o prune (fecha a janela C1).
          # Cobre _deploy-module (mesas/glossario/site/accounts), todos pegam o mesmo
          # lock shared (accounts entrou na esteira via F5). Re-checa a cada 5 min (flock -n)
          # so p/ logar progresso; FD 8 fica aberto ate o fim → lock so libera no exit.
          # ----------------------------------------------------------------
          if ! command -v flock >/dev/null 2>&1; then
            echo "ERRO: flock ausente na VM; nao da p/ garantir exclusao com deploy"
            exit 1
          fi
          exec 8>"/tmp/artificio-vm-mutate.lock"
          acquire_vm_lock() {
            local max_waits=6   # ate ~30 min; timeout-minutes do job e a guarda final
            local waited=0
            while :; do
              if flock -n -x 8; then
                [ "$waited" -gt 0 ] && echo "lock VM (exclusive) adquirido; prosseguindo"
                return 0
              fi
              if [ "$waited" -ge "$max_waits" ]; then
                echo "ERRO: deploy ativo apos $((max_waits * 5)) min; abortando limpeza"
                return 1
              fi
              waited=$((waited + 1))
              echo "deploy ativo (lock VM ocupado); aguardando 5 min (tentativa $waited/$max_waits)"
              sleep 300
            done
          }
          if ! acquire_vm_lock; then
            exit 1
          fi

          echo "== docker system df (ANTES) =="
          docker system df || true
          df -h /var/lib/docker 2>/dev/null || df -h / || true

          # Dangling images, containers parados ha >7d e CACHE DE BUILD.
          # builder prune TOTAL: o deploy builda com `--no-cache --pull`, entao o cache de
          # build nunca e reusado => preservar cache recente nao acelera nada e so acumula
          # (verificado 2026-06-16: ~20GB reclaimable <7d sobreviviam ao filtro until=168h).
          # O deploy ja faz prune total pos-deploy; aqui e a rede de seguranca. NAO remove
          # volumes (dados intactos) nem redes (artificio_net compartilhada).
          docker image prune -f
          docker container prune -f --filter "until=168h"
          docker builder prune --all -f

          # Mantém só as 3 imagens mais recentes por repositório.
          # Q3: `docker images` lista por criacao DECRESCENTE (mais nova primeiro) por
          # padrao, entao `tail -n +4` descarta as 3 mais novas SEM parsear timestamp/
          # timezone (parsing de {{.CreatedAt}} string e fragil). A imagem do container
          # atual e a mais nova → preservada.
          docker images --format "{{.Repository}}" | sort -u | while read -r repo; do
            if [ "$repo" != "<none>" ]; then
              docker images "$repo" --format "{{.ID}}" \
                | tail -n +4 \
                | xargs -r docker rmi -f 2>/dev/null || true
            fi
          done

          echo "== docker system df (DEPOIS) =="
          docker system df || true
          df -h /var/lib/docker 2>/dev/null || df -h / || true
          echo "== Containers no ar =="
          docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}' | sed -n '1,40p'
          REMOTE

          scp -i ~/.ssh/artificio_deploy_key -P "$DEPLOY_PORT" -o BatchMode=yes "$local_script" "$DEPLOY_USER@$DEPLOY_HOST:$remote_script"
          rm -f "$local_script"

          "${ssh_base[@]}" "set -euo pipefail
            chmod 700 '$remote_script'
            cleanup() { rm -f '$remote_script'; }
            trap cleanup EXIT
            bash '$remote_script'" | tee "$RUNNER_TEMP/cleanup-out.txt"

      - name: Resumo da limpeza
        if: always()
        run: |
          out="$RUNNER_TEMP/cleanup-out.txt"
          {
            echo "### Docker cleanup na VM"
            echo ""
            if [ -f "$out" ]; then
              echo '```'
              sed -n '1,200p' "$out"
              echo '```'
            else
              echo "sem saida capturada"
            fi
          } >> "$GITHUB_STEP_SUMMARY" || true
