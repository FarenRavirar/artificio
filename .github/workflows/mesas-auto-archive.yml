# ============================================================================
# WORKFLOW: Mesas Auto-Archive (D-MESAS1)
# RESPONSABILIDADE: arquivar automaticamente mesas publicadas ha mais de 1 mes.
# TRIGGER: Agendado (diario 04:00 UTC) ou manual (workflow_dispatch).
# ESCOPO: PROD apenas. Chama o endpoint da app (nao toca a VM/DB direto):
#         POST https://mesas.artificiorpg.com/api/v1/admin/tables/auto-archive
#         autenticado pelo header x-cron-secret = secret MESAS_CRON_SECRET.
# NOTES: o backend ja gateia PROD-only e valida o segredo. Idempotente: roda de
#        novo so pega as mesas que cruzaram o limite desde a ultima execucao.
#        Mesas arquivadas somem do catalogo publico; o dono pode desarquivar.
# PRE-REQUISITO (mantenedor): definir o secret MESAS_CRON_SECRET no repo com o
#        mesmo valor configurado no ambiente de producao do backend do mesas.
# ============================================================================

name: Mesas Auto-Archive

# Default branch = `dev` desde 2026-06-17 (D073). Como `schedule` so dispara da branch
# DEFAULT, este cron agora roda da copia de `dev`. Para nao executar acao de PROD com
# versao NAO PROMOVIDA (furo do gate dev->prod), o job `guard` so libera o
# auto-arquivamento se este workflow estiver IDENTICO a `origin/main` (= promovido).
# Diferiu de main => pula com warning ate o promote ff dev->main (D041). Fail-safe.
on:
  schedule:
    - cron: '0 4 * * *' # diario 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Gate dev->prod (D073): so prossegue se a versao rodando ja esta em origin/main.
  guard:
    name: Guard - so versao promovida (main)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      promoted: ${{ steps.check.outputs.promoted }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Comparar workflow com origin/main
        id: check
        run: |
          set -euo pipefail
          git fetch --no-tags origin main:refs/remotes/origin/main
          if git diff --quiet origin/main -- .github/workflows/mesas-auto-archive.yml; then
            echo "promoted=true" >> "$GITHUB_OUTPUT"
            echo "workflow == origin/main: ok para acao de PROD"
          else
            echo "promoted=false" >> "$GITHUB_OUTPUT"
            echo "::warning::mesas-auto-archive.yml difere de origin/main (nao promovido). Pulando acao de PROD ate promover (ff dev->main)."
          fi

  auto-archive:
    name: Auto-arquivar mesas antigas (prod)
    needs: guard
    if: needs.guard.outputs.promoted == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    concurrency:
      group: artificio-mesas-auto-archive
      cancel-in-progress: false
    steps:
      - name: Chamar endpoint de auto-arquivamento
        env:
          CRON_SECRET: ${{ secrets.MESAS_CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::Secret MESAS_CRON_SECRET nao configurado."
            exit 1
          fi
          url="https://mesas.artificiorpg.com/api/v1/admin/tables/auto-archive"
          tmp="$(mktemp)"
          code="$(curl -sS -o "$tmp" -w '%{http_code}' \
            -X POST "$url" \
            -H "x-cron-secret: ${CRON_SECRET}" \
            -H 'content-type: application/json')"
          echo "HTTP $code"
          cat "$tmp"
          echo ""
          if [ "$code" != "200" ]; then
            echo "::error::Auto-arquivamento falhou (HTTP $code)."
            exit 1
          fi
          count="$(node -e 'const fs=require("fs");try{const d=JSON.parse(fs.readFileSync(process.argv[1],"utf8"));console.log(d?.data?.count ?? "?")}catch{console.log("?")}' "$tmp")"
          echo "Mesas arquivadas: $count" >> "$GITHUB_STEP_SUMMARY"
