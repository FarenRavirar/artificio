name: _enforce-migration-dir

# Reusável: bloqueia PR que adiciona/altera .sql fora de diretórios de migration allowlisted.
# Mantém migrations rastreáveis e dentro do contrato de módulo (D039 / contrato de módulo G1).
on:
  workflow_call:

permissions:
  contents: read

jobs:
  enforce:
    name: Enforce migration dir
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Validate changed SQL paths
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail

          allowlist_file=".github/migration-dir-allowlist"
          if [ ! -f "$allowlist_file" ]; then
            echo "ERRO: $allowlist_file ausente"
            exit 1
          fi

          # Padroes permitidos (ignora comentarios/linhas vazias), glob bash nativo.
          mapfile -t patterns < <(grep -vE '^[[:space:]]*(#|$)' "$allowlist_file")
          if [ "${#patterns[@]}" -eq 0 ]; then
            echo "ERRO: allowlist vazia"
            exit 1
          fi

          is_allowed_sql_path() {
            local path="$1"
            local pattern=""
            for pattern in "${patterns[@]}"; do
              # shellcheck disable=SC2053  # pattern contem glob intencional.
              if [[ "$path" == ${pattern}* ]]; then
                return 0
              fi
            done
            return 1
          }

          if ! is_allowed_sql_path "apps/mesas/database/migration_999_selftest.sql"; then
            echo "::error::self-test allowlist falhou para path permitido"
            exit 1
          fi
          if is_allowed_sql_path "database/migration_999_selftest.sql"; then
            echo "::error::self-test allowlist permitiu path proibido"
            exit 1
          fi
          echo "Self-test allowlist: permitido/bloqueado OK."

          git fetch origin "$BASE_REF" --depth=1
          base_sha=$(git rev-parse "origin/${BASE_REF}")

          # Apenas arquivos .sql adicionados (A) ou modificados (M)
          mapfile -t changed_sql < <(git diff --name-only --diff-filter=AM "${base_sha}...HEAD" -- '*.sql')

          if [ "${#changed_sql[@]}" -eq 0 ]; then
            echo "Sem .sql adicionado/alterado. OK."
            exit 0
          fi

          fail=0
          for f in "${changed_sql[@]}"; do
            [ -z "$f" ] && continue
            ok=0
            if is_allowed_sql_path "$f"; then
              ok=1
            fi
            if [ "$ok" -eq 1 ]; then
              echo "permitido: $f"
            else
              echo "::error file=$f::migration fora dos diretórios allowlisted em .github/migration-dir-allowlist"
              fail=1
            fi
          done

          if [ "$fail" -ne 0 ]; then
            echo "BLOCKED: mova as migrations para um diretório allowlisted em .github/migration-dir-allowlist."
            exit 1
          fi
          echo "Todas as migrations dentro do contrato. OK."
