name: deploy-mesas

on:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "apps/mesas/**"
      - "packages/**"
      - "scripts/deploy/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/_deploy-module.yml"
      - ".github/workflows/_lint-shell.yml"
      - ".github/workflows/deploy-mesas.yml"
  push:
    branches:
      - main
      - dev
    paths:
      - "apps/mesas/**"
      - "packages/**"
      - "scripts/deploy/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/_deploy-module.yml"
      - ".github/workflows/_lint-shell.yml"
      - ".github/workflows/deploy-mesas.yml"
  workflow_dispatch:
    inputs:
      mode:
        description: "ci = build/test only; deploy = deploy via git-pull on VM"
        required: true
        default: ci
        type: choice
        options:
          - ci
          - deploy

permissions:
  contents: read

# Deploy/codigo do G1 devem passar pelo GitHub para branch safety e rastreabilidade.
# VM manual fica para bootstrap/conexao/instalacao operacional/rollback aprovado.
jobs:
  lint-shell:
    uses: ./.github/workflows/_lint-shell.yml

  # F11 (spec 026): auto-deploy beta SO quando o app do mesas muda. Antes, qualquer push
  # que batesse o path (packages/infra/workflow/manifests) auto-deployava mesas — caro e
  # desnecessario. Dispatch (mode=deploy) sempre deploya; mudanca de packages/infra sobe
  # por dispatch quando o mantenedor quiser.
  detect:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.d.outputs.deploy }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: d
        env:
          EVENT: ${{ github.event_name }}
          MODE: ${{ inputs.mode }}
          REF: ${{ github.ref }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          deploy=false
          if [ "$EVENT" = "workflow_dispatch" ] && [ "${MODE:-}" = "deploy" ]; then
            deploy=true
          elif [ "$EVENT" = "push" ] && [ "$REF" = "refs/heads/dev" ]; then
            # Auto-deploy beta so se apps/mesas/** mudou neste push. Se o before for
            # invalido (primeiro push/force-push/zeros), deploya por seguranca.
            if ! git rev-parse --verify --quiet "${BEFORE}^{commit}" >/dev/null 2>&1; then
              deploy=true
            elif git diff --name-only "$BEFORE" "$SHA" -- apps/mesas | grep -q .; then
              deploy=true
            fi
          fi
          echo "deploy=$deploy" >> "$GITHUB_OUTPUT"
          echo "auto_deploy_decision=$deploy event=$EVENT ref=$REF"

  mesas:
    needs: [lint-shell, detect]
    uses: ./.github/workflows/_deploy-module.yml
    with:
      module: mesas
      # env derivado central no _deploy-module (F3): dev->beta, senao prod.
      compose_file: docker-compose.prod.yml
      compose_file_beta: docker-compose.beta.yml
      compose_project: mesas
      compose_project_beta: mesas-beta
      db_service: mesas-db
      db_service_beta: mesas-beta-db
      db_name: mesas_rpg
      db_name_beta: mesas_rpg
      db_user: admin
      deploy: ${{ needs.detect.outputs.deploy == 'true' }}
      health_containers: '["mesas-api","mesas-app"]'
      health_containers_beta: '["mesas-beta-api","mesas-beta-app"]'
      critical_routes: >-
        [
          {"name":"home","url":"https://mesas.artificiorpg.com/","expected":"200"},
          {"name":"private_no_cookie","url":"https://mesas.artificiorpg.com/api/v1/me/options","expected":"401"},
          {"name":"auth_redirect","url":"https://mesas.artificiorpg.com/api/v1/auth/google","expected":"302","location_contains":"accounts.artificiorpg.com/login?return=https%3A%2F%2Fmesas.artificiorpg.com%2F"}
        ]
      critical_routes_beta: >-
        [
          {"name":"home","url":"https://mesasbeta.artificiorpg.com/","expected":"200"},
          {"name":"private_no_cookie","url":"https://mesasbeta.artificiorpg.com/api/v1/me/options","expected":"401"},
          {"name":"auth_redirect","url":"https://mesasbeta.artificiorpg.com/api/v1/auth/google","expected":"302","location_contains":"accounts.artificiorpg.com/login?return=https%3A%2F%2Fmesasbeta.artificiorpg.com%2F"}
        ]
    secrets:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
