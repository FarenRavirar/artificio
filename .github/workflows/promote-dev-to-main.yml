name: promote-dev-to-main

# PR standing: todo push em dev cria/atualiza PR de revisao para promocao.
# ATENCAO: nao usar squash/merge commit neste PR, pois isso quebra main ⊆ dev.
# Promocao segura = workflow promote-prod-fast-forward.yml ou Rebase and merge.
on:
  push:
    branches:
      - dev

permissions:
  contents: read
  pull-requests: write

jobs:
  promotion-pr:
    name: Promotion PR dev -> main
    runs-on: ubuntu-latest
    steps:
      - name: Create or update standing PR
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          number=$(gh pr list \
            --base main \
            --head dev \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          title="Revisar promocao dev para main"
          body=$(cat <<'EOF'
          PR standing automatico para revisar o que sera promovido de `dev` para `main`.

          **Regra critica:** `main` deve continuar ancestral de `dev` (`main ⊆ dev`).

          Nao use "Squash and merge" nem "Create a merge commit": ambos criam commit novo em `main` que nao existe em `dev`, quebrando o guard e bloqueando deploy prod.

          Promocao aprovada:
          1. Preferido: rodar workflow `promote-prod-fast-forward.yml` com confirmacao `PROMOTE_DEV_TO_MAIN`.
          2. Alternativa manual: usar somente "Rebase and merge" no GitHub.

          Depois da promocao, `main` deve apontar para o mesmo commit de `dev` ou para commit contido em `dev`.
          EOF
          )

          if [ -n "$number" ]; then
            if gh pr edit "$number" --title "$title" --body "$body"; then
              echo "promotion_pr=$number"
            else
              echo "::warning::GitHub Actions nao pode editar PRs neste repo. PR standing existente: #$number."
            fi
          elif gh pr create --base main --head dev --title "$title" --body "$body"; then
            echo "promotion_pr=created"
          else
            echo "::warning::GitHub Actions nao pode criar PR standing neste repo. Crie/atualize manualmente PR dev->main."
          fi
