name: secret-scan

# Spec 026 F-SEC: TruffleHog OSS varre secrets em commits/diff. Roda dentro do Actions,
# sem token/cadastro externo. Complementa o Secret Scanning NATIVO do GitHub (gratis em
# repo publico; habilitar em Settings -> Code security and analysis).
on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog OSS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Historico completo p/ diff incremental; em push, varre o range do evento.
          fetch-depth: 0

      - name: TruffleHog OSS
        # F2: terceiro pinado por SHA (v3.95.5). Bump via Dependabot.
        uses: trufflesecurity/trufflehog@f446421baf832d6356c42c1743d99abff52ff334 # v3.95.7
        with:
          # F2 supply-chain: pinar tambem a IMAGEM runtime do scanner. Sem isto o action
          # roda `ghcr.io/trufflesecurity/trufflehog:latest` (default), mudando o codigo
          # executado sem revisao/PR. Casar com a versao do action pinado.
          # NB: a TAG da imagem nao tem prefixo `v` (o action sim). Com `v` o pull vira
          # `ghcr.io/trufflesecurity/trufflehog:v3.95.5` => `manifest unknown` (exit 125).
          version: 3.95.5
          extra_args: --results=verified,unknown
