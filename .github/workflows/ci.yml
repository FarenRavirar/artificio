name: ci

# Spec 026 F-SEC: CI holistico de PR para o monorepo (lint + build + test).
# Complementa o CI por-modulo do _deploy-module.yml (que so roda no caminho de deploy).
# NAO faz deploy, nao usa secrets, nao toca VM/prod. Env de teste = placeholders dummy
# (NAO sao segredos; mesmos valores ja usados no job CI do _deploy-module).
on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build-test:
    name: lint + build + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        # Creds dummy de um service container EFEMERO do job (vida = 1 run, sem rede externa,
        # banco descartado ao fim). Nao e segredo; casa com os placeholders do step Test.
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: artificio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d artificio_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Cache turbo
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: .turbo
          key: turbo-ci-${{ github.sha }}
          restore-keys: |
            turbo-ci-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        # Advisory por ora: `@artificio/auth` e `@artificio/content` tem script `eslint .`
        # sem eslint.config.js (flat config ESLint 9 ausente) -> lint quebra. Debito de
        # repo (BL-CI-ESLINT-FLAT-CONFIG), nao deste workflow. Endurecer (remover
        # continue-on-error) depois que os flat configs faltantes existirem.
        continue-on-error: true
        run: pnpm -w turbo run lint --cache-dir=.turbo

      - name: Build
        run: pnpm -w turbo run build --cache-dir=.turbo

      - name: Test
        env:
          # Placeholders NAO-SECRETOS para tests que tocam Postgres/JWT/Cloudinary.
          DATABASE_URL: postgres://admin:admin@localhost:5432/artificio_test
          JWT_SECRET: ci_dummy_jwt_secret_do_not_use
          JWT_REFRESH_SECRET: ci_dummy_refresh_secret_do_not_use
          CLOUDINARY_CLOUD_NAME: ci
          CLOUDINARY_API_KEY: ci
          CLOUDINARY_API_SECRET: ci
        run: pnpm -w turbo run test --env-mode=loose --cache-dir=.turbo
