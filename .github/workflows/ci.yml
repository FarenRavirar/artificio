name: ci

# Spec 026 F-SEC: CI holistico de PR para o monorepo (lint + build + test).
# Complementa o CI por-modulo do _deploy-module.yml (que so roda no caminho de deploy).
# NAO faz deploy, nao usa secrets, nao toca VM/prod. Env de teste = placeholders dummy
# (NAO sao segredos; mesmos valores ja usados no job CI do _deploy-module).
on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build-test:
    name: lint + build + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        # Creds dummy de um service container EFEMERO do job (vida = 1 run, sem rede externa,
        # banco descartado ao fim). Nao e segredo; casa com os placeholders do step Test.
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: artificio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d artificio_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.8.0 --activate

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Cache turbo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo
          key: turbo-ci-${{ github.sha }}
          restore-keys: |
            turbo-ci-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        # Spec 035 (BL-CI-ESLINT-FLAT-CONFIG): eslint.config.js criados em packages/auth e
        # packages/content. Lint agora e gate obrigatorio (sem continue-on-error).
        run: pnpm -w turbo run lint --cache-dir=.turbo

      - name: Build
        run: pnpm -w turbo run build --cache-dir=.turbo

      - name: CJS workspace exports smoke
        run: pnpm smoke:cjs-exports

      - name: Test
        env:
          # Placeholders NAO-SECRETOS para tests que tocam Postgres/JWT/Cloudinary.
          DATABASE_URL: postgres://admin:admin@localhost:5432/artificio_test
          JWT_SECRET: ci_dummy_jwt_secret_do_not_use
          JWT_REFRESH_SECRET: ci_dummy_refresh_secret_do_not_use
          CLOUDINARY_CLOUD_NAME: ci
          CLOUDINARY_API_KEY: ci
          CLOUDINARY_API_SECRET: ci
        run: pnpm -w turbo run test --env-mode=loose --cache-dir=.turbo

  api-governance:
    name: api-governance
    runs-on: ubuntu-latest
    # Nao precisa de postgres, build ou tests — roda em paralelo com lint-build-test
    #
    # TRAVA REMOVIDA (achado 2026-07-11, PR #145): este job NAO bloqueia mais o
    # merge (nao e required check). Causa: api:diff compara o OpenAPI gerado
    # contra o branch base remoto (dev) no momento do run do CI; dev pode
    # avancar entre o push do PR e a execucao do job, fazendo o diff/relatorio
    # gerado no CI divergir do que foi commitado localmente — falso-positivo
    # de "artefato desatualizado" mesmo com pnpm verify:api rodado e limpo antes
    # do commit. A comparacao contra base real e responsabilidade do hook
    # local (pre-commit/pre-push, ja configurado no repo) que roda no working
    # tree do autor, nao num checkout raso de CI. Aqui so validamos o que NAO
    # depende de comparar contra estado remoto (inventory/consumers/lint/check),
    # como sinal informativo — sempre roda, nunca falha o job.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.8.0 --activate

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: API Inventory
        run: pnpm api:inventory

      - name: API Consumers
        run: pnpm api:consumers

      - name: Generate OpenAPI
        run: pnpm api:generate-openapi

      - name: API Bundle (índice para agentes)
        run: pnpm api:bundle

      - name: OpenAPI Lint
        env:
          REDOCLY_TELEMETRY: off
          REDOCLY_SUPPRESS_UPDATE_NOTICE: "true"
        run: pnpm api:lint

      - name: API Traffic Smoke (HAR automático quando configurado)
        run: pnpm api:traffic:smoke

      - name: API Traffic (tráfego observado)
        run: pnpm api:traffic

      - name: API Check (modo estrito — allowlist deve estar vazia)
        run: pnpm api:check --strict

      # A checagem de "artefato committed" foi removida deste job: dependia de
      # comparar contra o branch base remoto (dev), que e a fonte do falso-
      # positivo (dev pode avancar entre o push do PR e o run do job). Essa
      # validacao continua acontecendo — só que localmente, via hook
      # pre-commit/pre-push (scripts/api/verify-api.ts), antes de qualquer
      # commit real chegar ao GitHub.
      #
      # api:diff (achado nitpick pos-#145): restaurado aqui como sinal
      # informativo (continue-on-error do job inteiro ja cobre), mas comparando
      # contra o merge-base do PR — SHA fixo no momento do fetch, que NAO se
      # move durante o run — em vez do branch base remoto (dev) usado antes.
      # Isso elimina a causa raiz do falso-positivo sem reintroduzir a
      # comparacao com dev movel. So roda em pull_request (push direto a
      # dev/main nao tem PR/merge-base).
      - name: Resolve merge-base do PR (referencia estavel p/ api:diff)
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=50 origin "${{ github.event.pull_request.base.sha }}"
          echo "API_DIFF_BASE=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_ENV"

      - name: API Diff (informativo — base = merge-base do PR, nao bloqueante)
        if: github.event_name == 'pull_request'
        run: pnpm api:diff --base "$API_DIFF_BASE"
