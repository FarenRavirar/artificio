name: deploy-site

# DRAFT (D049). Site é beta-only (D044): sobe em beta.artificiorpg.com. Espelha deploy-mesas via _deploy-module.
# AÇÃO DO MANTENEDOR antes de habilitar:
#   1. Criar GitHub Environment + secrets: POSTGRES_PASSWORD, DATABASE_URL
#      (postgres://admin:<senha>@site-beta-db:5432/site), JWT_SECRET (= prod, SSO D042),
#      opc. CLOUDINARY_URL, PUBLIC_GA_ID, WP_BASE.
#   2. Rota Cloudflare Tunnel: beta.artificiorpg.com -> http://site-beta-app:4322.
#   3. Validar o passo de migração do _deploy-module: o site migra/builda NO ENTRYPOINT do container
#      (DB-dependente). Se o reusável rodar migração própria estilo mesas, torná-lo neutro p/ o site.
on:
  pull_request:
    branches: [main, dev]
    paths:
      - "apps/site/**"
      - "packages/**"
      - ".github/workflows/_deploy-module.yml"
      - ".github/workflows/_lint-shell.yml"
      - ".github/workflows/deploy-site.yml"
  push:
    branches: [dev]
    paths:
      - "apps/site/**"
      - "packages/**"
      - ".github/workflows/_deploy-module.yml"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:
    inputs:
      mode:
        description: "ci = build/test only; deploy = deploy via git-pull on VM (beta)"
        required: true
        default: ci
        type: choice
        options: [ci, deploy]

permissions:
  contents: read

jobs:
  lint-shell:
    uses: ./.github/workflows/_lint-shell.yml

  site:
    needs: lint-shell
    uses: ./.github/workflows/_deploy-module.yml
    with:
      module: site
      env: beta
      compose_file: docker-compose.beta.yml
      compose_file_beta: docker-compose.beta.yml
      compose_project: site
      compose_project_beta: site-beta
      db_service: site-beta-db
      db_service_beta: site-beta-db
      db_name: site
      db_name_beta: site
      db_user: admin
      deploy: ${{ (github.event_name == 'workflow_dispatch' && inputs.mode == 'deploy') || (github.event_name == 'push' && github.ref == 'refs/heads/dev') }}
      health_containers: '["site-beta-app"]'
      health_containers_beta: '["site-beta-app"]'
      critical_routes: >-
        [
          {"name":"home","url":"https://beta.artificiorpg.com/","expected":"200"},
          {"name":"healthz","url":"https://beta.artificiorpg.com/healthz","expected":"200"},
          {"name":"blog_index","url":"https://beta.artificiorpg.com/blog/","expected":"200"},
          {"name":"admin_protected","url":"https://beta.artificiorpg.com/admin/status","expected":"401"}
        ]
      critical_routes_beta: >-
        [
          {"name":"home","url":"https://beta.artificiorpg.com/","expected":"200"},
          {"name":"healthz","url":"https://beta.artificiorpg.com/healthz","expected":"200"},
          {"name":"blog_index","url":"https://beta.artificiorpg.com/blog/","expected":"200"},
          {"name":"admin_protected","url":"https://beta.artificiorpg.com/admin/status","expected":"401"}
        ]
    secrets: inherit
