name: codeql

# Spec 026 F-SEC: CodeQL (SAST nativo do GitHub) para JS/TS. Grátis em repo público.
# Resultados vao para Security -> Code scanning. Sem secret, sem servico externo.
# Linguagem unica `javascript-typescript` cobre .js/.ts/.tsx/.mjs. Python (3 scripts
# fora do runtime) ficou de fora p/ manter o build-mode simples; reavaliar se crescer.
on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev
  schedule:
    - cron: "27 4 * * 1" # semanal, segunda 04:27 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        # F2: terceiro pinado por SHA (v3). Bump = trocar SHA + comentario (Dependabot).
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: "/language:${{ matrix.language }}"
