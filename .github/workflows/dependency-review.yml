name: dependency-review

# Spec 026 F-SEC: bloqueia dependencia nova vulneravel/licenca problematica num PR.
# Usa o dependency graph nativo; gratis em repo publico. Sem secret, sem servico externo.
on:
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Dependency Review
        # F2: terceiro pinado por SHA (v5.0.0, node24). Bump via Dependabot.
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          comment-summary-in-pr: on-failure
          fail-on-severity: high
