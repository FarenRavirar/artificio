name: dependency-review

# Spec 026 F-SEC: bloqueia dependencia nova vulneravel/licenca problematica num PR.
# Usa o dependency graph nativo; gratis em repo publico. Sem secret, sem servico externo.
on:
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Dependency Review
        # F2: terceiro pinado por SHA (v4.5.0). Bump via Dependabot.
        uses: actions/dependency-review-action@3b139cfc5fae8b618d3eae3675e383bb1769c019 # v4.5.0
        with:
          comment-summary-in-pr: on-failure
          fail-on-severity: high
