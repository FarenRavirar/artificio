name: pr-checks

# Gates de PR para dev/main: lint de shell/workflows + contrato de migration.
# Canônico G1: validação roda no GitHub, não local.
on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  lint-shell:
    uses: ./.github/workflows/_lint-shell.yml

  enforce-migration-dir:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/_enforce-migration-dir.yml

  # spec 009 R2: scripts de ENTRYPOINT/CMD em Dockerfiles devem ser 100755 (evita
  # "exec: ./entrypoint.sh: permission denied" no deploy).
  guard-entrypoint-exec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: ENTRYPOINT scripts executaveis (100755)
        run: bash scripts/ci/check_entrypoint_exec_bit.sh
