name: _lint-shell

# Reusável: lint de shell scripts (shellcheck) + workflows (actionlint).
# Canônico G1: tudo que valida deploy/código roda no GitHub Actions, não local.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb6f51ef654c96127f7b33352a2ff591fcb # v7.0.0

      - name: ShellCheck
        # F2 (spec 026): pin por SHA (supply-chain). Bump = trocar SHA + comentario.
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          scandir: ./scripts

      - name: Migration lock self-test
        run: bash scripts/deploy/test_migration_lock.sh

      - name: Branch invariant self-test
        run: bash scripts/deploy/test_branch_invariant.sh

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb6f51ef654c96127f7b33352a2ff591fcb # v7.0.0

      - name: actionlint
        # F2 (spec 026): pin por SHA (supply-chain). Bump = trocar SHA + comentario.
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          reporter: github-check
          fail_level: error
