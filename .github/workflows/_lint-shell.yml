name: _lint-shell

# Reusável: lint de shell scripts (shellcheck) + workflows (actionlint).
# Canônico G1: tudo que valida deploy/código roda no GitHub Actions, não local.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts

      - name: Migration lock self-test
        run: bash scripts/deploy/test_migration_lock.sh

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-check
          fail_on_error: true
