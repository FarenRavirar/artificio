name: _deploy-module

on:
  workflow_call:
    inputs:
      module:
        required: true
        type: string
      # F3 (spec 026): vazio = derivar de github.ref no job `resolve` (dev->beta,
      # senao prod). Passar valor explicito so como OVERRIDE (ex.: break-glass=prod).
      env:
        required: false
        default: ""
        type: string
      compose_file:
        required: true
        type: string
      compose_file_beta:
        required: false
        default: ""
        type: string
      compose_project:
        required: false
        default: ""
        type: string
      compose_project_beta:
        required: false
        default: ""
        type: string
      db_service:
        required: true
        type: string
      db_service_beta:
        required: false
        default: ""
        type: string
      db_name:
        required: true
        type: string
      db_name_beta:
        required: false
        default: ""
        type: string
      db_user:
        required: false
        default: admin
        type: string
      health_containers:
        required: true
        type: string
      health_containers_beta:
        required: false
        default: ""
        type: string
      critical_routes:
        required: true
        type: string
      critical_routes_beta:
        required: false
        default: ""
        type: string
      deploy:
        required: false
        default: false
        type: boolean
      reconcile_same_project_orphans:
        required: false
        default: false
        type: boolean
    # F2 (spec 026): secrets explicitos (era `secrets: inherit` no caller). So os 5
    # DEPLOY_* necessarios trafegam ao reusavel; nada alem disso.
    secrets:
      DEPLOY_HOST:
        required: true
      DEPLOY_KNOWN_HOSTS:
        required: true
      DEPLOY_PORT:
        required: true
      DEPLOY_SSH_PRIVATE_KEY:
        required: true
      DEPLOY_USER:
        required: true

permissions:
  contents: read

jobs:
  resolve:
    name: Resolve env
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.r.outputs.env }}
    steps:
      - id: r
        env:
          ENV_OVERRIDE: ${{ inputs.env }}
          REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          # F3 (spec 026): env derivado em UM lugar a partir de github.ref. Override
          # opcional (break-glass passa env=prod). dispatch em dev => beta; mata a classe
          # de bug BL-DEP-MESAS-DISPATCH-ENV em todos os modulos de uma vez.
          if [ -n "${ENV_OVERRIDE}" ]; then
            resolved="${ENV_OVERRIDE}"
          elif [ "${REF}" = "refs/heads/dev" ]; then
            resolved="beta"
          else
            resolved="prod"
          fi
          case "$resolved" in
            beta|prod) ;;
            *) echo "ERRO: env resolvido invalido: $resolved"; exit 1 ;;
          esac
          echo "env=$resolved" >> "$GITHUB_OUTPUT"
          echo "resolved_env=$resolved override='${ENV_OVERRIDE}' ref='${REF}'"

  ci:
    name: CI ${{ inputs.module }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: artificio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d artificio_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # F11 (spec 026): pnpm ANTES do setup-node p/ habilitar cache do pnpm store
      # (keyed por pnpm-lock.yaml) — corta o re-download de deps a cada run.
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      # F11: cache do turbo (build/test incrementais por modulo).
      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ inputs.module }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ inputs.module }}-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build module
        run: pnpm -w turbo run build --filter=@artificio/${{ inputs.module }}* --cache-dir=.turbo

      - name: Test module
        env:
          DATABASE_URL: postgres://admin:admin@localhost:5432/artificio_test
          JWT_SECRET: ci_dummy_jwt_secret_do_not_use
          JWT_REFRESH_SECRET: ci_dummy_refresh_secret_do_not_use
          CLOUDINARY_CLOUD_NAME: ci
          CLOUDINARY_API_KEY: ci
          CLOUDINARY_API_SECRET: ci
        run: pnpm -w turbo run test --filter=@artificio/${{ inputs.module }}* --env-mode=loose --cache-dir=.turbo

  deploy:
    name: Deploy ${{ inputs.module }} ${{ needs.resolve.outputs.env }}
    needs: [resolve, ci]
    if: inputs.deploy
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.resolve.outputs.env == 'beta' && 'beta' || 'production' }}
    concurrency:
      group: artificio-${{ inputs.module }}-${{ needs.resolve.outputs.env }}-deploy-lock
      cancel-in-progress: false
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_ENV: ${{ needs.resolve.outputs.env }}
      MODULE: ${{ inputs.module }}
      COMPOSE_FILE: ${{ needs.resolve.outputs.env == 'beta' && inputs.compose_file_beta || inputs.compose_file }}
      COMPOSE_PROJECT: ${{ needs.resolve.outputs.env == 'beta' && inputs.compose_project_beta || inputs.compose_project }}
      DB_SERVICE: ${{ needs.resolve.outputs.env == 'beta' && inputs.db_service_beta || inputs.db_service }}
      DB_NAME: ${{ needs.resolve.outputs.env == 'beta' && inputs.db_name_beta || inputs.db_name }}
      DB_USER: ${{ inputs.db_user }}
      HEALTH_CONTAINERS: ${{ needs.resolve.outputs.env == 'beta' && inputs.health_containers_beta || inputs.health_containers }}
      CRITICAL_ROUTES: ${{ needs.resolve.outputs.env == 'beta' && inputs.critical_routes_beta || inputs.critical_routes }}
      RECONCILE_SAME_PROJECT_ORPHANS: ${{ inputs.reconcile_same_project_orphans }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate secrets
        run: |
          set -euo pipefail
          case "$DEPLOY_ENV" in
            prod|beta) echo "deploy_env=$DEPLOY_ENV" ;;
            *)
              echo "DEPLOY_ENV invalido: $DEPLOY_ENV"
              exit 1
              ;;
          esac
          for name in COMPOSE_FILE DB_SERVICE DB_NAME HEALTH_CONTAINERS CRITICAL_ROUTES; do
            if [ -z "${!name:-}" ]; then
              echo "$name=missing"
              exit 1
            fi
          done
          if [ "$DEPLOY_ENV" = "beta" ] && [ -z "${COMPOSE_PROJECT:-}" ]; then
            echo "COMPOSE_PROJECT=missing para beta; defina compose_project_beta distinto do prod."
            exit 1
          fi
          for name in DEPLOY_HOST DEPLOY_KNOWN_HOSTS DEPLOY_PORT DEPLOY_SSH_PRIVATE_KEY DEPLOY_USER; do
            if [ -z "${!name:-}" ]; then
              echo "$name=missing"
              exit 1
            fi
            echo "$name=present"
          done

      - name: Validate branch invariant
        run: |
          set -euo pipefail
          git fetch --no-tags --prune origin \
            +refs/heads/main:refs/remotes/origin/main \
            +refs/heads/dev:refs/remotes/origin/dev
          bash scripts/deploy/validate_branch_invariant.sh origin/main origin/dev

      - name: Prepare SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/artificio_deploy_key
          chmod 600 ~/.ssh/artificio_deploy_key
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      # Canonico G1: deploy/codigo rodam via GitHub Actions para rastreabilidade.
      # Acesso direto na VM fica reservado a bootstrap, instalacao operacional, conexao, diagnose/rollback aprovado.
      - name: Deploy module on VM
        run: |
          set -euo pipefail
          ssh_base=(ssh -i ~/.ssh/artificio_deploy_key -p "$DEPLOY_PORT" -o BatchMode=yes "$DEPLOY_USER@$DEPLOY_HOST")

          routes_b64=$(printf '%s' "$CRITICAL_ROUTES" | base64 -w0)
          health_b64=$(printf '%s' "$HEALTH_CONTAINERS" | base64 -w0)
          remote_script="/tmp/artificio-${MODULE}-${DEPLOY_ENV}-deploy-${GITHUB_RUN_ID}.sh"
          local_script=$(mktemp)

          cat > "$local_script" <<'REMOTE'
          set -euo pipefail
          if [ -z "${COMPOSE_PROJECT:-}" ]; then
            COMPOSE_PROJECT="$MODULE"
          fi
          export COMPOSE_PROJECT

          case "$DEPLOY_ENV" in
            prod)
              deploy_branch="main"
              deploy_ref="origin/main"
              deploy_dir="/opt/artificio"
              env_file_name=".env"
              ;;
            beta)
              deploy_branch="dev"
              deploy_ref="origin/dev"
              deploy_dir="/opt/artificio-beta"
              env_file_name=".env.beta"
              ;;
            *)
              echo "ERRO: DEPLOY_ENV invalido: $DEPLOY_ENV"
              exit 1
              ;;
          esac

          cd "$deploy_dir"

          if ! command -v jq >/dev/null 2>&1; then
            echo "ERRO: jq ausente na VM. Rode bootstrap CDX-309 Parte C para instalar prereqs antes do deploy."
            exit 1
          fi

          if [ ! -d .git ]; then
            echo "ERRO: $deploy_dir ainda nao e clone git. Rode bootstrap aprovado antes do deploy."
            exit 1
          fi

          # Lock VM-wide (RW): deploy = SHARED (concorre com outros deploys); a
          # manutencao (docker-cleanup.yml) pega EXCLUSIVE e nunca prune durante deploy.
          # FD 8 fica aberto ate o fim do script → libera no exit. -w 600: se a limpeza
          # semanal estiver segurando o exclusive, espera ate 10 min antes de falhar.
          if command -v flock >/dev/null 2>&1; then
            exec 8>"/tmp/artificio-vm-mutate.lock"
            if ! flock -s -w 600 8; then
              echo "ERRO: timeout aguardando lock VM (manutencao em curso?)"
              exit 1
            fi
          fi

          exec 9>"/tmp/artificio-${MODULE}-deploy.lock"
          if ! flock -w 180 9; then
            echo "ERRO: timeout aguardando lock de deploy $MODULE"
            exit 1
          fi

          module_dir="apps/${MODULE}"
          env_file="${module_dir}/${env_file_name}"
          if [ ! -f "$env_file" ]; then
            echo "ERRO: $env_file ausente na VM (bootstrap de modulo novo, spec 009 R3)."
            echo "  1) cd $deploy_dir && git fetch origin $deploy_branch && git reset --hard $deploy_ref"
            echo "  2) criar $env_file (gitignored) com os segredos do ambiente"
            echo "  3) re-rodar este deploy (workflow_dispatch mode=deploy)"
            exit 1
          fi

          read_env_value() {
            local key="$1"
            local file="$2"
            grep "^${key}=" "$file" | tail -n1 | cut -d= -f2- | tr -d '\r' || true
          }

          if [ "$MODULE" != "accounts" ]; then
            accounts_env_file="apps/accounts/${env_file_name}"
            if [ ! -f "$accounts_env_file" ]; then
              echo "ERRO: $accounts_env_file ausente; crie o anchor SSO explicito do ambiente antes do deploy."
              exit 1
            fi
            accounts_jwt=$(read_env_value "JWT_SECRET" "$accounts_env_file")
            module_jwt=$(read_env_value "JWT_SECRET" "$env_file")
            if [ -z "$accounts_jwt" ] || [ -z "$module_jwt" ] || [ "$accounts_jwt" != "$module_jwt" ]; then
              echo "ERRO: JWT_SECRET de $MODULE diverge de accounts"
              exit 1
            fi
            echo "jwt_secret_shared=true"
          fi

          git fetch origin "$deploy_branch" --tags
          git reset --hard "$deploy_ref"

          cd "$module_dir"
          snapshot_file="/tmp/artificio-${MODULE}-${DEPLOY_ENV}-predeploy-${GITHUB_RUN_ID}.dump"

          rollback() {
            echo "ROLLBACK: restaurando snapshot e containers de $MODULE..."
            if [ -f "$snapshot_file" ]; then
              docker cp "$snapshot_file" "${DB_SERVICE}:/tmp/predeploy.dump" || true
              docker exec "$DB_SERVICE" pg_restore -U "$DB_USER" -d "$DB_NAME" --clean --if-exists /tmp/predeploy.dump || true
              docker exec "$DB_SERVICE" rm -f /tmp/predeploy.dump || true
            fi
            docker compose -p "$COMPOSE_PROJECT" -f "$COMPOSE_FILE" --env-file "$env_file_name" up -d --force-recreate || true
            echo "ROLLBACK: tentativa concluida; verificar manualmente."
          }
          trap rollback ERR

          # spec 009 R1: reconcile de leftover — remove container cujo NOME e esperado por este modulo
          # mas pertence a OUTRO projeto compose (ex.: subida manual). Evita conflito de nome no 'up'.
          # Nunca remove volume; nunca toca containers de outro nome (mesas/accounts intactos).
          reconcile_leftover() {
            local name="$1"
            [ -z "$name" ] && return 0
            if docker container inspect "$name" >/dev/null 2>&1; then
              local proj
              proj=$(docker inspect --format '{{index .Config.Labels "com.docker.compose.project"}}' "$name" 2>/dev/null || echo "")
              if [ "$proj" != "$COMPOSE_PROJECT" ]; then
                echo "reconcile: removendo leftover '$name' (project='${proj:-<none>}' != alvo '$COMPOSE_PROJECT')"
                docker rm -f "$name" >/dev/null 2>&1 || true
              fi
            fi
          }
          reconcile_leftover "$DB_SERVICE"
          while IFS= read -r _rc_name; do
            [ -n "$_rc_name" ] && reconcile_leftover "$_rc_name"
          done < <(printf '%s' "$HEALTH_CONTAINERS_B64" | base64 -d | jq -r '.[]')

          # Bootstrap de legado no mesmo compose project: containers antigos podem ter
          # o nome esperado, mas service label antigo (ex.: db-beta). Compose os trata
          # como orphans do mesmo project e conflita antes do primeiro up. Opt-in por
          # modulo; remove apenas containers do proprio project e nunca volumes.
          if [ "${RECONCILE_SAME_PROJECT_ORPHANS:-false}" = "true" ]; then
            target_services=$(docker compose -p "$COMPOSE_PROJECT" -f "$COMPOSE_FILE" --env-file "$env_file_name" config --services)
            needs_orphan_down=false
            check_same_project_orphan() {
              local name="$1"
              [ -z "$name" ] && return 0
              if docker container inspect "$name" >/dev/null 2>&1; then
                local proj service
                proj=$(docker inspect --format '{{index .Config.Labels "com.docker.compose.project"}}' "$name" 2>/dev/null || echo "")
                service=$(docker inspect --format '{{index .Config.Labels "com.docker.compose.service"}}' "$name" 2>/dev/null || echo "")
                if [ "$proj" = "$COMPOSE_PROJECT" ] && [ -n "$service" ] && ! printf '%s\n' "$target_services" | grep -Fxq "$service"; then
                  echo "reconcile: same-project orphan '$name' (service='$service', project='$COMPOSE_PROJECT')"
                  needs_orphan_down=true
                fi
              fi
            }
            check_same_project_orphan "$DB_SERVICE"
            while IFS= read -r _rc_name; do
              [ -n "$_rc_name" ] && check_same_project_orphan "$_rc_name"
            done < <(printf '%s' "$HEALTH_CONTAINERS_B64" | base64 -d | jq -r '.[]')
            if [ "$needs_orphan_down" = "true" ]; then
              docker compose -p "$COMPOSE_PROJECT" -f "$COMPOSE_FILE" --env-file "$env_file_name" down --remove-orphans
            fi
          fi

          docker compose -p "$COMPOSE_PROJECT" -f "$COMPOSE_FILE" --env-file "$env_file_name" up -d "$DB_SERVICE"

          for i in $(seq 1 60); do
            if docker compose -p "$COMPOSE_PROJECT" -f "$COMPOSE_FILE" --env-file "$env_file_name" exec -T "$DB_SERVICE" pg_isready -U "$DB_USER" -d "$DB_NAME" >/dev/null 2>&1; then
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "ERRO: banco $DB_SERVICE nao ficou pronto"
              exit 1
            fi
            sleep 2
          done

          docker exec "$DB_SERVICE" pg_dump -U "$DB_USER" -d "$DB_NAME" -Fc -f /tmp/predeploy.dump
          docker cp "${DB_SERVICE}:/tmp/predeploy.dump" "$snapshot_file"
          docker exec "$DB_SERVICE" rm -f /tmp/predeploy.dump
          echo "snapshot_created=$snapshot_file"

          bash ../../scripts/deploy/apply_required_migrations.sh "$COMPOSE_FILE" "$DB_SERVICE" "$DB_NAME" "$DB_USER" "database"

          docker compose -p "$COMPOSE_PROJECT" -f "$COMPOSE_FILE" --env-file "$env_file_name" down --remove-orphans
          docker compose -p "$COMPOSE_PROJECT" -f "$COMPOSE_FILE" --env-file "$env_file_name" build --no-cache --pull
          docker compose -p "$COMPOSE_PROJECT" -f "$COMPOSE_FILE" --env-file "$env_file_name" up -d --force-recreate

          HEALTH_CONTAINERS=$(printf '%s' "$HEALTH_CONTAINERS_B64" | base64 -d)
          while IFS= read -r container; do
            [ -z "$container" ] && continue
            for i in $(seq 1 60); do
              status=$(docker inspect --format '{{.State.Health.Status}}' "$container" 2>/dev/null || echo missing)
              if [ "$status" = "healthy" ]; then
                echo "healthy_${container}=true"
                break
              fi
              if [ "$i" -eq 60 ]; then
                echo "ERRO: $container nao ficou healthy"
                docker logs "$container" --tail=120 || true
                exit 1
              fi
              sleep 3
            done
          done < <(printf '%s' "$HEALTH_CONTAINERS" | jq -r '.[]')

          CRITICAL_ROUTES=$(printf '%s' "$CRITICAL_ROUTES_B64" | base64 -d)
          while IFS= read -r route; do
            name=$(echo "$route" | jq -r '.name')
            url=$(echo "$route" | jq -r '.url')
            expected=$(echo "$route" | jq -r '.expected')
            contains=$(echo "$route" | jq -r '.location_contains // empty')
            headers="/tmp/${MODULE}-${name}.headers"
            code=$(curl -sS -D "$headers" -o /dev/null -w '%{http_code}' "$url" || echo 000)
            echo "smoke_${name}=$code"
            if [ "$code" != "$expected" ]; then
              echo "ERRO: smoke $name esperava $expected recebeu $code"
              exit 1
            fi
            if [ -n "$contains" ] && ! grep -qi "location: .*${contains}" "$headers"; then
              echo "ERRO: smoke $name location sem $contains"
              exit 1
            fi
          done < <(printf '%s' "$CRITICAL_ROUTES" | jq -c '.[]')

          rm -f "$snapshot_file"
          trap - ERR

          # spec 026 F10: o que acumula disco e o BUILD CACHE, nao imagens. Verificado na
          # VM (2026-06-16): 1 imagem tagueada por repo (tag movel :latest), dangling=0,
          # mas build cache ~20GB reclaimable. Como o build usa `--no-cache --pull`, o cache
          # de build NUNCA e reusado => 100% descartavel. Prune TOTAL pos-deploy recupera
          # tudo sem perda de velocidade; BuildKit preserva cache de build ativo (deploy
          # concorrente seguro). `image prune -f` mantem dangling em zero.
          docker image prune -f
          docker builder prune -f
          docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}' | sed -n '1,40p'
          REMOTE

          scp -i ~/.ssh/artificio_deploy_key -P "$DEPLOY_PORT" -o BatchMode=yes "$local_script" "$DEPLOY_USER@$DEPLOY_HOST:$remote_script"
          rm -f "$local_script"

          "${ssh_base[@]}" "set -euo pipefail
            chmod 700 '$remote_script'
            cleanup() { rm -f '$remote_script'; }
            trap cleanup EXIT
            export MODULE='$MODULE'
            export DEPLOY_ENV='$DEPLOY_ENV'
            export COMPOSE_FILE='$COMPOSE_FILE'
            export COMPOSE_PROJECT='$COMPOSE_PROJECT'
            export DB_SERVICE='$DB_SERVICE'
            export DB_NAME='$DB_NAME'
            export DB_USER='$DB_USER'
            export HEALTH_CONTAINERS_B64='$health_b64'
            export CRITICAL_ROUTES_B64='$routes_b64'
            export RECONCILE_SAME_PROJECT_ORPHANS='$RECONCILE_SAME_PROJECT_ORPHANS'
            export GITHUB_RUN_ID='$GITHUB_RUN_ID'
            bash '$remote_script'" | tee "$RUNNER_TEMP/deploy-out.txt"

      # spec 009 R4: resumo de smoke/health/snapshot no Summary do run (observabilidade).
      - name: Resumo do deploy
        if: always()
        run: |
          out="$RUNNER_TEMP/deploy-out.txt"
          {
            echo "### Deploy ${MODULE:-?} (${DEPLOY_ENV:-?})"
            echo ""
            echo "| check | valor |"
            echo "|---|---|"
            if [ -f "$out" ]; then
              grep -E '^(jwt_secret_shared|snapshot_created|healthy_|smoke_|reconcile:)' "$out" \
                | while IFS= read -r line; do
                    k="${line%%=*}"; v="${line#*=}"
                    [ "$k" = "$v" ] && v=""
                    echo "| ${k} | ${v} |"
                  done
            else
              echo "| status | sem saida capturada |"
            fi
          } >> "$GITHUB_STEP_SUMMARY" || true
