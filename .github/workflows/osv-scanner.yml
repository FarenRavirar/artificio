name: osv-scanner

# Spec 026 F-SEC: OSV-Scanner (Google, OSS) varre o pnpm-lock.yaml por vulnerabilidades
# conhecidas (OSV.dev). Roda 100% dentro do Actions, sem token/cadastro externo.
# SARIF vai para Security -> Code scanning via workflow reusavel oficial.
on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev
  schedule:
    - cron: "41 4 * * 1" # semanal, segunda 04:41 UTC

permissions:
  contents: read

jobs:
  scan-pr:
    name: OSV scan (PR)
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      security-events: write
      actions: read
    # F2: reusavel oficial pinado por SHA (v2.3.8).
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8

  scan:
    name: OSV scan
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
