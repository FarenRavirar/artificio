# F2 (spec 026): mantem os SHAs pinados das GitHub Actions atualizados sem esforco manual.
# Dependabot abre PR semanal quando sai versao nova de uma action usada nos workflows,
# ja com o novo SHA pinado, para revisao/merge. Casa com a politica de pin por SHA
# (supply-chain): pinado E mantido.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
    labels:
      - dependencies
      - github-actions
    open-pull-requests-limit: 5
    # Agrupa todas as actions num unico PR semanal (igual ao npm abaixo),
    # em vez de 1 PR por action. Reduz ruido e evita lote de PRs parados.
    groups:
      github-actions:
        update-types:
          - major
          - minor
          - patch

  # Spec 026 F-SEC: dependencias npm/pnpm do monorepo. Dependabot le o pnpm-lock.yaml
  # raiz (workspace) e os manifests de apps/packages via glob de diretorios.
  # PRs agrupados p/ reduzir ruido; nao toca runtime, so abre PR para revisao/merge.
  - package-ecosystem: npm
    directories:
      - "/"
      - "/apps/*"
      - "/apps/*/frontend"
      - "/apps/*/backend"
      - "/packages/*"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
      - npm
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      prod-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
