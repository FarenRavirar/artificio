<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artificio Header Preview</title>
    <link rel="stylesheet" href="../src/styles.css" />

          <nav aria-label="Modulos do Artificio">
            <ul class="artificio-nav-list">

              <li><a class="artificio-nav-link" href="#">Mesas</a></li>
              <li><a class="artificio-nav-link" href="#">Downloads</a></li>
              <li><a class="artificio-nav-link" href="#">Esferas</a></li>
              <li><a class="artificio-nav-link" href="#">SRD</a></li>

          </nav>
          <div class="artificio-session">
            <button class="artificio-login-button" type="button">Entrar</button>

      <section>
        <h1>Logado</h1>
        <header class="artificio-header">
          <a class="artificio-brand" href="#">
            <span aria-hidden="true" class="artificio-brand-mark">A</span>

          <nav aria-label="Modulos do Artificio">
            <ul class="artificio-nav-list">

              <li><a class="artificio-nav-link" href="#">Glossario</a></li>
              <li><a class="artificio-nav-link" aria-current="page" href="#">Mesas</a></li>
              <li><a class="artificio-nav-link" href="#">Downloads</a></li>
              <li><a class="artificio-nav-link" href="#">Esferas</a></li>
              <li><a class="artificio-nav-link" href="#">SRD</a></li>
            </ul>
          </nav>
          <div class="artificio-session">
            <a class="artificio-avatar-link" href="#">
              <span class="artificio-avatar artificio-avatar-fallback">AA</span>
              <span class="artificio-user-name">Ana Artifice</span>
            </a>
          </div>
        </header>
      </section>
    </main>

</html>
